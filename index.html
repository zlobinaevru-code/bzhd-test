<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>БЖД тест - 349 вопросов</title>
  <style>
    :root {
      --bg1: #13294b;
      --bg2: #255aa7;
      --card: #ffffff;
      --muted: #667085;
      --text: #101828;
      --line: #e4e7ec;
      --accent: #ff9800;
      --accent2: #2a5298;
      --good: #1f9d55;
      --bad: #d92d20;
      --soft-good: #e8f7ee;
      --soft-bad: #fff0ee;
      --soft-blue: #eef5ff;
      --shadow: 0 14px 35px rgba(16, 24, 40, .18);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: radial-gradient(circle at top left, rgba(255,255,255,.16), transparent 28%), linear-gradient(135deg, var(--bg1), var(--bg2));
      color: var(--text);
      padding: 18px;
    }
    .container { max-width: 980px; margin: 0 auto; }
    .header { color: #fff; text-align: center; margin: 10px 0 18px; }
    .header h1 { font-size: clamp(1.7rem, 3.5vw, 2.7rem); line-height: 1.1; margin-bottom: 8px; }
    .header p { opacity: .92; font-size: .98rem; }
    .panel {
      background: rgba(255,255,255,.13);
      border: 1px solid rgba(255,255,255,.18);
      backdrop-filter: blur(8px);
      border-radius: 20px;
      padding: 12px;
      margin-bottom: 14px;
    }
    .filters { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
    .filter-btn, .tool-btn {
      border: 0;
      border-radius: 999px;
      padding: 9px 13px;
      cursor: pointer;
      font-weight: 700;
      font-size: .82rem;
      transition: transform .12s ease, background .12s ease, color .12s ease;
    }
    .filter-btn { color: #fff; background: rgba(255,255,255,.18); }
    .filter-btn:hover, .tool-btn:hover { transform: translateY(-1px); }
    .filter-btn.active { background: var(--accent); color: #fff; }
    .score-board {
      position: sticky;
      top: 10px;
      z-index: 5;
      background: #fff;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      border-radius: 20px;
      padding: 13px 15px;
      margin-bottom: 16px;
    }
    .score-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .score { font-size: 1.65rem; font-weight: 900; color: var(--good); }
    .stats { display: flex; flex-wrap: wrap; gap: 8px 14px; color: var(--muted); font-size: .86rem; }
    .progress-bar { height: 9px; background: #edf0f5; border-radius: 999px; margin-top: 10px; overflow: hidden; }
    .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent2), var(--good)); transition: width .2s ease; }
    .tools { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin: 0 0 16px; }
    .tool-btn { background: var(--accent); color: #fff; }
    .tool-btn.secondary { background: #fff; color: var(--accent2); }
    .question-card {
      background: var(--card);
      border: 1px solid var(--line);
      box-shadow: 0 10px 24px rgba(16, 24, 40, .12);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 14px;
      overflow: hidden;
    }
    .question-card.correct { border-left: 6px solid var(--good); background: linear-gradient(90deg, var(--soft-good), #fff 34%); }
    .question-card.incorrect { border-left: 6px solid var(--bad); background: linear-gradient(90deg, var(--soft-bad), #fff 34%); }
    .q-meta { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
    .topic-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--accent2);
      color: #fff;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: .74rem;
      font-weight: 800;
    }
    .source-num { color: var(--muted); font-size: .76rem; }
    .question-text { font-size: 1rem; line-height: 1.45; font-weight: 800; margin-bottom: 12px; }
    .options { display: grid; gap: 8px; }
    .option {
      display: grid;
      grid-template-columns: 26px 1fr;
      align-items: start;
      gap: 10px;
      padding: 11px 12px;
      border: 1px solid #d0d5dd;
      background: #f9fafb;
      border-radius: 14px;
      cursor: pointer;
      transition: background .12s ease, border-color .12s ease, transform .12s ease;
      line-height: 1.35;
      font-size: .93rem;
    }
    .option:hover { background: var(--soft-blue); border-color: #9cc7ff; transform: translateY(-1px); }
    .option .letter {
      width: 26px;
      height: 26px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: #e8eef8;
      color: var(--accent2);
      font-weight: 900;
      font-size: .78rem;
    }
    .option.selected.correct-choice { background: var(--soft-good); border-color: var(--good); }
    .option.selected.wrong-choice { background: var(--soft-bad); border-color: var(--bad); }
    .option.revealed-correct { background: var(--soft-good); border-color: var(--good); }
    .feedback { display: none; margin-top: 12px; padding: 10px 12px; border-radius: 12px; font-size: .9rem; line-height: 1.4; }
    .feedback.show.correct-feedback { display: block; color: #0f5132; background: var(--soft-good); border: 1px solid #b7e4c7; }
    .feedback.show.incorrect-feedback { display: block; color: #842029; background: var(--soft-bad); border: 1px solid #ffd0ca; }
    .empty { color: #fff; text-align: center; padding: 30px 0; }
    footer { color: rgba(255,255,255,.82); text-align: center; font-size: .78rem; padding: 18px 0 8px; }
    @media (max-width: 640px) {
      body { padding: 12px; }
      .question-card { padding: 13px; }
      .score-board { top: 6px; border-radius: 16px; }
      .score { font-size: 1.35rem; }
      .filter-btn, .tool-btn { font-size: .76rem; padding: 8px 10px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>📚 БЖД тест</h1>
      <p>Все разделы из PDF: шум, радиация, заземление, аэрозоли, микроклимат и освещение.</p>
    </header>

    <section class="panel">
      <div class="filters" id="filterButtons"></div>
    </section>

    <section class="score-board" aria-live="polite">
      <div class="score-top">
        <div class="score" id="scoreValue">0/0</div>
        <div class="stats">
          <span>Показано: <b id="visibleCount">0</b></span>
          <span>Отвечено: <b id="answeredCount">0</b></span>
          <span>Ошибок: <b id="wrongCount">0</b></span>
        </div>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </section>

    <div class="tools">
      <button class="tool-btn" id="reshuffleBtn" type="button">🔀 Перемешать заново</button>
      <button class="tool-btn secondary" id="resetBtn" type="button">🔄 Сбросить ответы</button>
    </div>

    <main id="questionsContainer"></main>
    <footer>Выбери вариант - тест сразу покажет результат и правильный ответ, если была ошибка.</footer>
  </div>

  <script>
    const ORIGINAL_QUESTIONS = [{"topic":"Шум","sourceNumber":1,"text":"Что нужно делать с машиной, если измеренное значение ее шумовой характеристики превышает \"ПДШХ\"?","opts":["Необходимо осуществить дополнительные мероприятия по снижению шума машины.","Нет правильного ответа.","Сделать соответствующую запись в формуляре машины.","Согласовать ее применение с Заказчиком."],"correct":0},{"topic":"Шум","sourceNumber":2,"text":"В каких случаях применяются индивидуальные средства защиты от шума?","opts":["Во всех случаях, когда они имеются на рабочих местах.","При технической невозможности или экономической нецелесообразности применения средств коллективной защиты.","В тех случаях, когда шум является импульсным.","В тех случаях, когда шум является тональным."],"correct":1},{"topic":"Шум","sourceNumber":3,"text":"Как классифицируются средства коллективной защиты по отношению к источнику шума?","opts":["Звукоизолирующие, трансформирующие, звукогасящие.","Интегральные и дифференциальные.","Снижающие шум в источнике и снижающие шум на пути его распространения.","Местные, общие и комбинированные."],"correct":2},{"topic":"Шум","sourceNumber":4,"text":"Зачем звукоизолирующие кожухи обклеивают звукопоглощающими материалами?","opts":["Для предотвращения резонансных явлений в машине.","Для гашения кинетической энергии разлетающихся осколков при разрушении машины.","Для демпфирования вибраций кожуха.","Для увеличения звукоизоляции."],"correct":3},{"topic":"Шум","sourceNumber":5,"text":"Как взаимодействует звуковая волна с преградой, на которую она падает?","opts":["Энергия звуковой волны частично отражается, частично поглощается, а частично излучается по другую сторону преграды.","Энергия звуковой волны трансформируется в энергию электромагнитных колебаний, излучаемых преградой.","Энергия звуковой волны полностью отражается.","Энергия звуковой волны переизлучается с изменением фазы и частоты."],"correct":0},{"topic":"Шум","sourceNumber":6,"text":"Как определяется коэффициент звукоизоляции?","opts":["Как разность коэффициентов поглощения и отражения.","Как отношение интенсивности звука в падающей на преграду волне к интенсивности звука в волне, прошедшей через преграду.","Как отношение интенсивности звука, поглощенного материалом, к интенсивности звука в падающей волне.","Как отношение интенсивности звука в отраженной волне к интенсивности звука в волне, прошедшей за преграду."],"correct":1},{"topic":"Шум","sourceNumber":7,"text":"От чего зависит звукоизоляция основной преграды?","opts":["Только от формы преграды.","Исключительно от массы преграды.","От частоты звука и массы единицы ее поверхности.","Только от толщины преграды."],"correct":2},{"topic":"Шум","sourceNumber":8,"text":"Как зависит звукоизоляция преграды от частоты звука?","opts":["Обратно-пропорциональна частоте.","Не зависит.","Нет правильного ответа.","Зависит от логарифма частоты."],"correct":3},{"topic":"Шум","sourceNumber":9,"text":"Что такое реверберация?","opts":["Многократное отражение звуковой волны от стен, потолка и предметов в помещении.","Восстановление волнового фронта звуковой волны при отражении.","Явление поглощения звука при отражении.","Переизлучение звука в открытое пространство за пределы помещения."],"correct":0},{"topic":"Шум","sourceNumber":10,"text":"Что такое \"время реверберации помещения\"?","opts":["Это время восстановления волнового фронта звуковой волны.","Это время, необходимое для уменьшения уровня звукового давления на 60 дБ после прекращения действия источника звука.","Это время, необходимое для уменьшения звукового давления в 10 раз после прекращения действия источника звука.","Это время, в течение которого звуковая волна однократно проходит расстояние между стенами помещения."],"correct":1},{"topic":"Шум","sourceNumber":11,"text":"Что определяется с помощью \"времени реверберации\"?","opts":["Шумовой индекс помещения.","Звукоизоляция преграды.","Коэффициент звукопоглощения помещения.","Отношение коэффициентов звукопоглощения и звукоизоляции."],"correct":2},{"topic":"Шум","sourceNumber":12,"text":"Что нужно делать, если стандартом или техническими условиями на машину установлены \"ТДШХ\"?","opts":["Увеличивать температуру и влажность воздуха в помещении.","Для откачки звуковой мощности установить в помещении микрофон, а усилитель с динамиком вынести за пределы помещения.","Применять дополнительные коллективные и индивидуальные средства и методы защиты от шума.","Выдавать работникам молоко за вредные условия труда."],"correct":2},{"topic":"Шум","sourceNumber":13,"text":"Как влияет интенсивность падающей волны на звукоизоляцию преграды?","opts":["Не влияет.","С увеличением интенсивности звукоизоляция увеличивается.","Звукоизоляция падает с увеличением интенсивности.","Нет четко выраженной закономерности, хотя изменения звукоизоляции происходят."],"correct":0},{"topic":"Шум","sourceNumber":14,"text":"Что происходят при звукопоглощении?","opts":["Отражение звука в направлении источника.","В спектр звука добавляются новые частоты, сдвинутые по фазе на 100 градусов.","Энергия звука переходит в тепловую энергию.","Происходит усиление звука за звукопоглощающим покрытием."],"correct":2},{"topic":"Шум","sourceNumber":15,"text":"Что такое \"ПДШХ\" машины?","opts":["Параметрическая дифференциальная шумовая характеристика.","Предельно-допустимая шумовая характеристика.","Предельно-достижимая шумовая характеристика.","Постоянно-действующая шумовая характеристика."],"correct":1},{"topic":"Шум","sourceNumber":16,"text":"Исходя из каких требований задается \"ПДШХ\"?","opts":["Исходя из требований минимизации радио- и акустических помех.","По нормативам соответствующих министерств.","Исходя из требований обеспечения на рабочих местах допустимых уровней шума.","Исходя из требований экономии электроэнергии, потребляемой машиной."],"correct":2},{"topic":"Шум","sourceNumber":17,"text":"Сколько гостированных методов применяется при измерении шумовых характеристик машин?","opts":["Только один.","Только два.","Только три.","Пять."],"correct":3},{"topic":"Шум","sourceNumber":18,"text":"Что такое \"ТДШХ\" машины?","opts":["Технически-достижимые шумовые характеристики.","Технически-допустимые шумовые характеристики.","Типовые допустимые шумовые характеристики.","Типовые дифференциальные шумовые характеристики."],"correct":0},{"topic":"Шум","sourceNumber":19,"text":"В каких единицах записываются шумовые характеристики машин в научно-технической документации?","opts":["В Неперах уровня звуковой мощности.","В децибеллах уровня звуковой мощности.","В Герцах, умноженных на Вольты.","В Вольтах, деленных на корень из Герца."],"correct":1},{"topic":"Шум","sourceNumber":20,"text":"Какой технический показатель шумности машины определяется при строго регламентированных режимах ее работы в условиях испытаний?","opts":["ПДШХ.","Интенсивность акустических колебаний.","Интенсивность звукового давления.","Шумовая характеристика машины в виде уровня звуковой мощности."],"correct":3},{"topic":"Шум","sourceNumber":21,"text":"Что такое шумовая характеристика машины?","opts":["Технический показатель машины \"Уровень звуковой мощности\", измеренный при строго регламентированных режимах ее работы.","Краткое описание характера звука, создаваемого машиной.","Уровень помех, создаваемый машиной по цепям электропитания.","Уровень электромагнитных наводок на измерительные приборы."],"correct":0},{"topic":"Шум","sourceNumber":22,"text":"В каких единицах измерения приводятся в технической документации значения \"ПДШХ\"?","opts":["В Паскалях.","В Ваттах на метр квадратный.","В децибеллах.","В Ваттах."],"correct":2},{"topic":"Шум","sourceNumber":23,"text":"За какими машинами и на какой срок закрепляется \"ТДШХ\"?","opts":["За машинами, которые не соответствуют лучшим мировым образцам, причем только на один год.","Нет правильного ответа.","За машинами, которые соответствуют лучшим мировым образцам аналогичной техники, причем на ограниченный срок.","За всеми машинами на весь срок их службы."],"correct":2},{"topic":"Шум","sourceNumber":24,"text":"Нужно ли при определении \"ПДШХ\" машины проводить акустические измерения?","opts":["Только в спорных случаях.","Не нужно.","Нужно.","Только для зарубежных машин."],"correct":1},{"topic":"Шум","sourceNumber":25,"text":"Чем обосновывается значение \"ПДШХ\"?","opts":["Результатами измерений шумовых характеристик машины при испытаниях ее в типовых условиях эксплуатации.","Техническим совершенством машины.","Стандартами предприятия или отрасли.","Допустимыми уровнями шума на рабочих местах по ГОСТ 12.1.003-83 с учетом поправки на групповую установку."],"correct":3},{"topic":"Шум","sourceNumber":26,"text":"В каких единицах записываются результаты измерения шумовых характеристик машины?","opts":["В децибеллах.","В Ваттах.","В Паскалях.","Нет правильного ответа."],"correct":0},{"topic":"Шум","sourceNumber":27,"text":"Что означает число, присутствующее в обозначении предельного спектра?","opts":["Уровень звука в децибеллах \"А\" при измерении на характеристике \"медленно\" шумомера.","Уровень звукового давления в децибеллах в октавной полосе со среднегеометрической частотой 1000 Гц.","Максимальный уровень звукового давления в децибеллах в любой октавной полосе частот.","Нет правильного ответа."],"correct":1},{"topic":"Шум","sourceNumber":28,"text":"На чем основано гигиеническое нормирование шума?","opts":["На задании предельно-допустимых уровней звукового давления в октавных полосах частот.","На задании предельно-допустимых уровней звукового давления в октавной полосе со среднегеометрической частотой 1000 Гц.","На задании уровней шума в децибеллах \"А\" на частотах 250, 500 и 1000 Гц.","Нет правильного ответа."],"correct":0},{"topic":"Шум","sourceNumber":29,"text":"Как можно оценить опасность непостоянного во времени шума?","opts":["По максимальному значению шума, измеренного шумомером в течение 30 минут.","Путем логарифмирования суммы двух отсчетов показаний шумомера, сделанных в течении 30 минут.","Путем сравнения с эквивалентным уровнем постоянного     const TOPIC_ICONS = {
      "all": "🧩",
      "Шум": "🔊",
      "Радиация": "☢️",
      "Заземление": "⚡",
      "Аэрозоли": "🌫️",
      "Микроклимат": "🌡️",
      "Освещение": "💡"
    };
    const LETTERS = ["A", "B", "C", "D"];
    let currentTopic = "all";
    let currentQuestions = [];
    let selectedAnswers = [];

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function shuffleArray(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function shuffleQuestion(question, globalIndex) {
      const options = question.opts.map((text, originalIndex) => ({
        text,
        isCorrect: originalIndex === question.correct
      }));
      return {
        ...question,
        id: `${question.topic}-${question.sourceNumber}-${globalIndex}-${Math.random().toString(36).slice(2)}`,
        options: shuffleArray(options)
      };
    }

    function getTopics() {
      return ["all", ...new Set(ORIGINAL_QUESTIONS.map(q => q.topic))];
    }

    function topicTitle(topic) {
      if (topic === "all") return `Все (${ORIGINAL_QUESTIONS.length})`;
      const count = ORIGINAL_QUESTIONS.filter(q => q.topic === topic).length;
      return `${topic} (${count})`;
    }

    function renderFilters() {
      const wrap = document.getElementById("filterButtons");
      wrap.innerHTML = getTopics().map(topic => `
        <button class="filter-btn ${topic === currentTopic ? "active" : ""}" data-topic="${escapeHtml(topic)}" type="button">
          ${TOPIC_ICONS[topic] || "📌"} ${escapeHtml(topicTitle(topic))}
        </button>
      `).join("");
    }

    function updateQuestions() {
      const filtered = currentTopic === "all"
        ? ORIGINAL_QUESTIONS
        : ORIGINAL_QUESTIONS.filter(q => q.topic === currentTopic);
      currentQuestions = shuffleArray(filtered).map((q, idx) => shuffleQuestion(q, idx));
      selectedAnswers = new Array(currentQuestions.length).fill(null);
      renderFilters();
      renderQuestions();
      updateScore();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function optionClass(questionIndex, optionIndex) {
      const selected = selectedAnswers[questionIndex];
      if (selected === null) return "";
      const option = currentQuestions[questionIndex].options[optionIndex];
      const classes = [];
      if (selected === optionIndex) classes.push("selected");
      if (option.isCorrect && selected !== null) classes.push("revealed-correct");
      if (selected === optionIndex && option.isCorrect) classes.push("correct-choice");
      if (selected === optionIndex && !option.isCorrect) classes.push("wrong-choice");
      return classes.join(" ");
    }

    function renderQuestions() {
      const container = document.getElementById("questionsContainer");
      if (!currentQuestions.length) {
        container.innerHTML = '<div class="empty">Вопросов по этому фильтру нет.</div>';
        return;
      }
      container.innerHTML = currentQuestions.map((q, qIndex) => {
        const selected = selectedAnswers[qIndex];
        const answered = selected !== null;
        const isCorrect = answered && q.options[selected].isCorrect;
        const correctOption = q.options.find(o => o.isCorrect);
        const correctIndex = q.options.findIndex(o => o.isCorrect);
        const cardClass = answered ? (isCorrect ? "correct" : "incorrect") : "";
        const feedbackClass = !answered ? "" : (isCorrect ? "show correct-feedback" : "show incorrect-feedback");
        const feedbackText = !answered
          ? ""
          : isCorrect
            ? `✅ Правильно!`
            : `❌ Неправильно.<br>📌 Правильный ответ: <b>${LETTERS[correctIndex]})</b> ${escapeHtml(correctOption.text)}`;
        return `
          <article class="question-card ${cardClass}" data-question-index="${qIndex}">
            <div class="q-meta">
              <span class="topic-tag">${TOPIC_ICONS[q.topic] || "📌"} ${escapeHtml(q.topic)}</span>
              <span class="source-num">Вопрос из PDF №${q.sourceNumber}</span>
            </div>
            <div class="question-text">${qIndex + 1}. ${escapeHtml(q.text)}</div>
            <div class="options">
              ${q.options.map((opt, optIndex) => `
                <button class="option ${optionClass(qIndex, optIndex)}" data-option-index="${optIndex}" type="button">
                  <span class="letter">${LETTERS[optIndex]}</span>
                  <span>${escapeHtml(opt.text)}</span>
                </button>
              `).join("")}
            </div>
            <div class="feedback ${feedbackClass}">${feedbackText}</div>
          </article>
        `;
      }).join("");
    }

    function checkAnswer(questionIndex, optionIndex) {
      selectedAnswers[questionIndex] = optionIndex;
      const card = document.querySelector(`[data-question-index="${questionIndex}"]`);
      if (!card) return;
      const q = currentQuestions[questionIndex];
      const isCorrect = q.options[optionIndex].isCorrect;
      const correctIndex = q.options.findIndex(o => o.isCorrect);
      const correctOption = q.options[correctIndex];
      card.classList.toggle("correct", isCorrect);
      card.classList.toggle("incorrect", !isCorrect);
      card.querySelectorAll(".option").forEach((btn, idx) => {
        btn.className = `option ${optionClass(questionIndex, idx)}`;
      });
      const fb = card.querySelector(".feedback");
      fb.className = `feedback show ${isCorrect ? "correct-feedback" : "incorrect-feedback"}`;
      fb.innerHTML = isCorrect
        ? "✅ Правильно!"
        : `❌ Неправильно.<br>📌 Правильный ответ: <b>${LETTERS[correctIndex]})</b> ${escapeHtml(correctOption.text)}`;
      updateScore();
    }

    function updateScore() {
      const answered = selectedAnswers.filter(v => v !== null).length;
      const correct = selectedAnswers.reduce((sum, answer, idx) => {
        if (answer === null) return sum;
        return sum + (currentQuestions[idx].options[answer].isCorrect ? 1 : 0);
      }, 0);
      const wrong = answered - correct;
      const total = currentQuestions.length;
      const percent = total ? (answered / total) * 100 : 0;
      document.getElementById("scoreValue").textContent = `${correct}/${total}`;
      document.getElementById("visibleCount").textContent = total;
      document.getElementById("answeredCount").textContent = answered;
      document.getElementById("wrongCount").textContent = wrong;
      document.getElementById("progressFill").style.width = `${percent}%`;
    }

    document.getElementById("filterButtons").addEventListener("click", (event) => {
      const btn = event.target.closest(".filter-btn");
      if (!btn) return;
      currentTopic = btn.dataset.topic;
      updateQuestions();
    });

    document.getElementById("questionsContainer").addEventListener("click", (event) => {
      const option = event.target.closest(".option");
      if (!option) return;
      const card = option.closest(".question-card");
      checkAnswer(Number(card.dataset.questionIndex), Number(option.dataset.optionIndex));
    });

    document.getElementById("resetBtn").addEventListener("click", () => {
      selectedAnswers = new Array(currentQuestions.length).fill(null);
      renderQuestions();
      updateScore();
    });

    document.getElementById("reshuffleBtn").addEventListener("click", updateQuestions);

    updateQuestions();
  </script>
</body>
</html>
